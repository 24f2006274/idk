name: Daily Commit

on:
  schedule:
    - cron: '17 3 * * *'   # runs daily at 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 24f2006274@ds.study.iitm.ac.in
        run: echo "Workflow running"

      - name: Make daily commit
        run: |
          date >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily-log.txt
          git commit -m "Daily automated commit" || echo "No changes"
          git push
